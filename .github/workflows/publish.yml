name: Publish to NPM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create tags and releases
      id-token: write # REQUIRED for Trusted Publishing & NPM Provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to see previous tags

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Check if version changed
        id: check_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          
          # Check if version already on NPM
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already exists on NPM. Skipping."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "New version $VERSION detected!"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
            
            if [[ "$VERSION" == *"-"* ]]; then
              echo "npm_tag=beta" >> $GITHUB_OUTPUT
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "npm_tag=latest" >> $GITHUB_OUTPUT
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Install Dependencies
        if: steps.check_version.outputs.changed == 'true'
        run: npm ci

      - name: Build and Test
        if: steps.check_version.outputs.changed == 'true'
        run: |
          npm run lint
          npm run build
          npm test

      - name: Publish to NPM
        if: steps.check_version.outputs.changed == 'true'
        # Trusted publishing uses GitHub's OIDC token for npm publish.
        run: npm publish --provenance --access public --tag ${{ steps.check_version.outputs.npm_tag }} --ignore-scripts --no-git-checks

      - name: Create GitHub Release
        if: steps.check_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check_version.outputs.version }}
          name: v${{ steps.check_version.outputs.version }}
          body: 'See CHANGELOG.md for details.'
          draft: false
          prerelease: ${{ steps.check_version.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
